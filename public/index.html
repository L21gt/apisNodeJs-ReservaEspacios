<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reservas - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Iniciar Sesión</h1>
        
        <!-- Formulario de Login -->
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="......" required>
            </div>
            <button type="submit" class="btn-primary">Ingresar</button>
        </form>
        
        <p class="toggle-form">¿No tienes cuenta? <a href="#" id="toggleRegister">Regístrate aquí</a></p>
        
        <!-- Formulario de Registro (oculto inicialmente) -->
        <form id="registerForm" class="auth-form" style="display:none;">
            <div class="form-group">
                <label for="primer_nombre">Nombre:</label>
                <input type="text" id="primer_nombre" placeholder="Ej: Juan" required>
            </div>
            <div class="form-group">
                <label for="primer_apellido">Apellido:</label>
                <input type="text" id="primer_apellido" placeholder="Ej: Pérez" required>
            </div>
            <div class="form-group">
                <label for="emailReg">Email:</label>
                <input type="email" id="emailReg" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label for="passwordReg">Contraseña:</label>
                <input type="password" id="passwordReg" placeholder="......" required>
            </div>
            <div class="form-group">
                <label for="telefonoReg">Teléfono (opcional):</label>
                <input type="tel" id="telefonoReg" placeholder="Ej: +56912345678">
            </div>
            <button type="submit" class="btn-primary">Registrarse</button>
        </form>
    </div>
    
    <!-- Loader -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Cargando...</p>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
